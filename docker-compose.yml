services:
  app:
    build:
      args:
        user: akuma
        uid: 1000
      context: ./
      dockerfile: Dockerfile
    image: kelas-app
    container_name: kelas-app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./:/var/www
    networks:
      - kelas
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  webserver:
    image: nginx:alpine
    container_name: kelas-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx/kelas.conf:/etc/nginx/conf.d/default.conf
    networks:
      - kelas
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: kelas-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-kelas}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-kelas}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - kelas
    ports:
      - "3306:3306"

networks:
  kelas:
    driver: bridge

volumes:
  dbdata:
    driver: local
